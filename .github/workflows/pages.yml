name: Deploy Jekyll site

on:
  push:
    branches: [main]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'

    - run: |
        gem install bundler
        bundle install

    - run: bundle exec jekyll build

    - uses: actions/upload-pages-artifact@v3
      with:
        path: ./_site

  deploy:

    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/deploy-pages@v4